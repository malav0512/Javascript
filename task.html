<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Touch Game with Random Colors and Score</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            user-select: none;
        }

        #container {
            width: 500px;
            height: 500px;
            margin-top: 20px;
            display: grid;
            border: 2px solid #333;
            background: #eee;
        }

        .cell {
            width: 100%;
            height: 100%;
            cursor: pointer;
            border-radius: 6px;
            transition: background-color 0.3s ease;
        }

        #start {
            padding: 8px 16px;
            font-size: 16px;
        }

        #timer,
        #score {
            margin-top: 15px;
            font-size: 18px;
            font-weight: bold;
        }

        #message {
            margin-top: 15px;
            font-size: 20px;
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <button id="start">Start</button>
    <div id="timer">Time: 45</div>
    <div id="score">Score: 0</div>
    <div id="container"></div>
    <div id="message"></div>

    <script>
        const container = document.getElementById('container');
        const startBtn = document.getElementById('start');
        const timerDisplay = document.getElementById('timer');
        const messageDisplay = document.getElementById('message');
        const scoreDisplay = document.getElementById('score');

        const containerSize = 320; // fixed size px
        const gap = 5; // gap in px
        let dimension = 2;
        let countdown = 45;
        let intervalId = null;
        let score = 0;

        const dimensionCounts = {};

        function maxOccurrences(dim) {
            if (dim <= 4) return 1;
            else if (dim <= 6) return 2;
            else return 3;
        }

        function startGame() {
            dimension = 2;
            countdown = 45;
            score = 0;
            messageDisplay.textContent = "";
            scoreDisplay.textContent = `Score: ${score}`;
            dimensionCounts[2] = 0;
            clearInterval(intervalId);
            timerDisplay.textContent = `Time: ${countdown}`;
            startBtn.disabled = true;
            createGrid();
            intervalId = setInterval(() => {
                countdown--;
                timerDisplay.textContent = `Time: ${countdown}`;
                if (countdown <= 0) {
                    clearInterval(intervalId);
                    endGame("Time's up! Game Over.");
                }
            }, 1000);
        }

        function endGame(msg) {
            clearInterval(intervalId);
            messageDisplay.textContent = msg;
            startBtn.disabled = false;
            container.innerHTML = '';
        }

        function createGrid() {
            if (!dimensionCounts[dimension]) dimensionCounts[dimension] = 0;
            if (dimensionCounts[dimension] >= maxOccurrences(dimension)) {
                dimension++;
                if (!dimensionCounts[dimension]) dimensionCounts[dimension] = 0;
            }
            dimensionCounts[dimension]++;

            container.innerHTML = "";
            container.style.width = containerSize + "px";
            container.style.height = containerSize + "px";
            container.style.display = "grid";
            container.style.gap = gap + "px";

            const totalGap = gap * (dimension - 1);
            const cellSize = (containerSize - totalGap) / dimension;

            container.style.gridTemplateColumns = `repeat(${dimension}, ${cellSize}px)`;
            container.style.gridTemplateRows = `repeat(${dimension}, ${cellSize}px)`;

            const totalCells = dimension * dimension;

            // Random hue per dimension
            const hue = Math.floor(Math.random() * 361);

            const lightIndex = Math.floor(Math.random() * totalCells);

            for (let i = 0; i < totalCells; i++) {
                const cell = document.createElement("div");
                cell.classList.add("cell");

                if (i === lightIndex) {
                    cell.style.backgroundColor = `hsl(${hue}, 75%, 80%)`;
                    cell.addEventListener("click", () => {
                        score++;
                        scoreDisplay.textContent = `Score: ${score}`;
                        dimension++;
                        createGrid();
                    });
                } else {
                    cell.style.backgroundColor = `hsl(${hue}, 75%, 60%)`;
                    cell.addEventListener("click", () => {
                        endGame("Wrong cell clicked! Game Over.");
                    });
                }

                container.appendChild(cell);
            }
        }

        startBtn.addEventListener("click", startGame);
    </script>

</body>

</html>
